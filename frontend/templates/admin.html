<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENISO Assistant - Admin Console</title>
  <meta name="api-base-url" content="{{ api_base_url }}" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode:"class",
      theme:{ extend:{
        colors:{
          "surface":"#101415","surface-container":"#1d2022","surface-container-low":"#191c1e",
          "surface-container-high":"#272a2c","surface-container-highest":"#323537",
          "on-surface":"#e0e3e5","on-surface-variant":"#b9cacb",
          "outline-variant":"#3b494b","outline":"#849495",
          "primary-fixed-dim":"#00dbe9","primary-fixed":"#7df4ff","on-primary-fixed":"#002022",
          "error":"#ffb4ab","error-container":"#93000a"
        },
        fontFamily:{ sans:["Inter","sans-serif"] }
      }}
    }
  </script>
  <style>
    body{font-family:'Inter',sans-serif;}
    .nav-active{background:rgba(0,219,233,.05);border-right:2px solid #00dbe9;color:#00dbe9;}
    @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
    .ping-anim{animation:ping 1.2s cubic-bezier(0,0,.2,1) infinite;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease-out;}
    table thead th{position:sticky;top:0;z-index:10;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(0,219,233,.2);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(0,219,233,.4);}
    .drop-zone{border:2px dashed rgba(0,219,233,.25);transition:all .25s;}
    .drop-zone:hover,.drop-zone.drag-over{border-color:#00dbe9;background:rgba(0,219,233,.04);}
  </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex selection:bg-primary-fixed-dim selection:text-on-primary-fixed">

<div id="app" class="flex w-full h-screen">

  <!-- ── Access Denied (not admin) ── -->
  <div v-if="!isAdmin && !loadingAuth" class="flex flex-col items-center justify-center w-full gap-4">
    <span class="material-symbols-outlined text-6xl text-error">lock</span>
    <h1 class="text-2xl font-light text-on-surface">Admin Access Required</h1>
    <p class="text-on-surface-variant text-sm">You must be an admin to view this page.</p>
    <a href="/" class="mt-2 px-6 py-2.5 bg-primary-fixed-dim text-on-primary-fixed rounded-lg text-sm font-semibold hover:bg-primary-fixed transition-all">← Back to Chat</a>
  </div>

  <div v-if="loadingAuth" class="flex flex-col items-center justify-center w-full gap-4">
    <span class="material-symbols-outlined animate-spin text-primary-fixed-dim text-4xl">sync</span>
    <p class="text-on-surface-variant text-sm">Authenticating...</p>
  </div>

  <!-- ── Main Admin Layout ── -->
  <template v-if="isAdmin && !loadingAuth">
    <!-- SIDEBAR -->
    <nav class="bg-slate-950 w-64 flex-shrink-0 border-r border-slate-800 flex flex-col py-8 fixed left-0 top-0 h-full z-50">
      <div class="px-6 mb-8">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-surface-container border border-outline-variant flex items-center justify-center shadow-[0_0_12px_rgba(0,219,233,0.2)]">
            <span class="material-symbols-outlined text-primary-fixed-dim text-xl">admin_panel_settings</span>
          </div>
          <div>
            <div class="text-primary-fixed-dim text-base font-semibold tracking-tight">ENISO Assistant</div>
            <div class="text-on-surface-variant text-xs">Admin Console</div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex flex-col gap-1 px-3">
        <a href="/" class="text-slate-500 py-3 px-4 flex items-center gap-3 rounded-lg hover:bg-slate-900 hover:text-slate-200 text-xs uppercase font-bold tracking-widest cursor-pointer transition-all">
          <span class="material-symbols-outlined text-lg">chat</span><span>Assistant</span>
        </a>
        <button @click="activeTab='dashboard'" :class="activeTab==='dashboard'?'nav-active':'text-slate-500 hover:bg-slate-900 hover:text-slate-200'" class="py-3 px-4 flex items-center gap-3 rounded-lg text-xs uppercase font-bold tracking-widest cursor-pointer transition-all text-left w-full">
          <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1">dashboard</span><span>Dashboard</span>
        </button>
        <button @click="activeTab='logs'" :class="activeTab==='logs'?'nav-active':'text-slate-500 hover:bg-slate-900 hover:text-slate-200'" class="py-3 px-4 flex items-center gap-3 rounded-lg text-xs uppercase font-bold tracking-widest cursor-pointer transition-all text-left w-full">
          <span class="material-symbols-outlined text-lg">receipt_long</span><span>Audit Logs</span>
        </button>
        <button @click="activeTab='users'" :class="activeTab==='users'?'nav-active':'text-slate-500 hover:bg-slate-900 hover:text-slate-200'" class="py-3 px-4 flex items-center gap-3 rounded-lg text-xs uppercase font-bold tracking-widest cursor-pointer transition-all text-left w-full">
          <span class="material-symbols-outlined text-lg">group</span><span>Users</span>
        </button>
        <button @click="activeTab='docs'" :class="activeTab==='docs'?'nav-active':'text-slate-500 hover:bg-slate-900 hover:text-slate-200'" class="py-3 px-4 flex items-center gap-3 rounded-lg text-xs uppercase font-bold tracking-widest cursor-pointer transition-all text-left w-full">
          <span class="material-symbols-outlined text-lg">folder_open</span><span>Knowledge Base</span>
        </button>
        <button @click="activeTab='settings'" :class="activeTab==='settings'?'nav-active':'text-slate-500 hover:bg-slate-900 hover:text-slate-200'" class="py-3 px-4 flex items-center gap-3 rounded-lg text-xs uppercase font-bold tracking-widest cursor-pointer transition-all text-left w-full">
          <span class="material-symbols-outlined text-lg">settings</span><span>Settings</span>
        </button>
      </div>

      <div class="px-3 mt-auto flex flex-col gap-2">
        <div class="px-4 py-3 bg-surface-container rounded-lg border border-outline-variant flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-primary-fixed-dim/20 border border-primary-fixed-dim/30 flex items-center justify-center text-primary-fixed-dim text-sm font-bold">
            [[ username.charAt(0).toUpperCase() ]]
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-on-surface truncate">[[ username ]]</div>
            <div class="text-xs text-primary-fixed-dim">System Admin</div>
          </div>
        </div>
        <button @click="logout" class="w-full py-2.5 px-4 flex items-center gap-2 text-slate-500 hover:text-slate-200 hover:bg-slate-900 rounded-lg text-xs uppercase font-bold tracking-widest transition-all">
          <span class="material-symbols-outlined text-lg">logout</span><span>Logout</span>
        </button>
      </div>
    </nav>

    <!-- MAIN CANVAS -->
    <div class="flex-1 flex flex-col min-w-0 pl-64 h-screen">

      <!-- TOP BAR -->
      <header class="bg-slate-950/80 backdrop-blur-md border-b border-slate-800 flex items-center justify-between h-16 px-6 sticky top-0 z-40">
        <div class="text-lg font-semibold tracking-tight text-on-surface">
          [[ activeTab.charAt(0).toUpperCase() + activeTab.slice(1) ]]
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="relative flex h-2.5 w-2.5">
              <span class="ping-anim absolute inline-flex h-full w-full rounded-full bg-primary-fixed-dim opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary-fixed-dim shadow-[0_0_8px_rgba(0,219,233,0.8)]"></span>
            </span>
            <span class="text-xs text-primary-fixed-dim font-bold uppercase tracking-widest">Live</span>
          </div>
          <button @click="loadData" class="text-slate-400 hover:text-primary-fixed-dim hover:bg-slate-900/50 p-2 rounded-full transition-all active:scale-90" title="Refresh Data">
            <span class="material-symbols-outlined text-lg">refresh</span>
          </button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-8 bg-surface">
        <div class="max-w-7xl mx-auto flex flex-col gap-8">

          <!-- ── DASHBOARD TAB ── -->
          <div v-if="activeTab==='dashboard'" class="fade-up flex flex-col gap-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-4 gap-4">
              <div class="bg-surface-container border border-outline-variant rounded-xl p-5 flex flex-col gap-3 relative overflow-hidden">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Total Queries</span>
                  <span class="material-symbols-outlined text-primary-fixed-dim">forum</span>
                </div>
                <div class="text-4xl font-light text-on-surface">[[ stats.total_logs ]]</div>
                <div class="text-xs text-on-surface-variant mt-1">All time chat interactions</div>
              </div>
              <div class="bg-surface-container border border-outline-variant rounded-xl p-5 flex flex-col gap-3 relative overflow-hidden">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Today's Queries</span>
                  <span class="material-symbols-outlined text-primary-fixed-dim">today</span>
                </div>
                <div class="text-4xl font-light text-on-surface">[[ stats.today_logs ]]</div>
                <div class="text-xs text-on-surface-variant mt-1">Activity in last 24h</div>
              </div>
              <div class="bg-surface-container border border-outline-variant rounded-xl p-5 flex flex-col gap-3 relative overflow-hidden">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Total Users</span>
                  <span class="material-symbols-outlined text-primary-fixed-dim">group</span>
                </div>
                <div class="text-4xl font-light text-on-surface">[[ stats.total_users ]]</div>
                <div class="text-xs text-on-surface-variant mt-1">Registered accounts</div>
              </div>
              <div class="bg-surface-container border border-outline-variant rounded-xl p-5 flex flex-col gap-3 relative overflow-hidden">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Knowledge Base</span>
                  <span class="material-symbols-outlined text-primary-fixed-dim">description</span>
                </div>
                <div class="text-4xl font-light text-on-surface">[[ stats.total_docs ]]</div>
                <div class="text-xs text-on-surface-variant mt-1">Indexed documents</div>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-6">
              <!-- Activity Chart -->
              <div class="col-span-2 bg-surface-container border border-outline-variant rounded-xl p-6">
                <h3 class="text-sm font-semibold text-on-surface mb-4">Query Volume (Last 7 Days)</h3>
                <div class="h-64 relative w-full">
                  <canvas id="activityChart"></canvas>
                </div>
              </div>
              <!-- Top Users -->
              <div class="bg-surface-container border border-outline-variant rounded-xl p-6">
                <h3 class="text-sm font-semibold text-on-surface mb-4">Top Active Users</h3>
                <div class="flex flex-col gap-3">
                  <div v-for="(u, idx) in stats.top_users" :key="idx" class="flex items-center justify-between">
                    <div class="flex items-center gap-2 text-sm text-on-surface">
                      <span class="w-5 text-on-surface-variant text-xs">[[ idx+1 ]].</span>
                      [[ u.username ]]
                    </div>
                    <div class="text-xs font-mono bg-surface-container-highest px-2 py-1 rounded text-primary-fixed-dim">
                      [[ u.count ]]
                    </div>
                  </div>
                  <div v-if="!stats.top_users?.length" class="text-sm text-on-surface-variant">No user activity yet.</div>
                </div>
              </div>
            </div>
          </div>

          <!-- ── LOGS TAB ── -->
          <div v-if="activeTab==='logs'" class="fade-up flex flex-col gap-4">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-2xl font-light text-on-surface">Audit Logs</h2>
                <p class="text-sm text-on-surface-variant mt-1">Traceability of all system interactions</p>
              </div>
              <div class="flex items-center gap-3">
                <div class="flex items-center bg-surface-container border border-outline-variant rounded-lg px-3 py-2 focus-within:border-primary-fixed-dim transition-all">
                  <span class="material-symbols-outlined text-on-surface-variant text-lg mr-2">search</span>
                  <input v-model="searchLogs" type="text" placeholder="Search prompts..." class="bg-transparent border-none outline-none text-on-surface placeholder-on-surface-variant/50 text-sm w-64 focus:ring-0 p-0"/>
                </div>
                <button @click="exportCSV(filteredLogs, 'audit_logs')" class="flex items-center gap-2 px-4 py-2 border border-outline-variant text-on-surface-variant hover:border-primary-fixed-dim hover:text-primary-fixed-dim rounded-lg text-sm font-medium transition-all">
                  <span class="material-symbols-outlined text-lg">download</span> Export
                </button>
              </div>
            </div>

            <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
              <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                <table class="w-full text-sm">
                  <thead class="bg-surface-container-highest text-on-surface-variant text-xs uppercase tracking-widest">
                    <tr>
                      <th class="px-5 py-3 text-left w-20">ID</th>
                      <th class="px-5 py-3 text-left w-32">User</th>
                      <th class="px-5 py-3 text-left">Prompt / Response</th>
                      <th class="px-5 py-3 text-left w-40">Timestamp</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="log in filteredLogs" :key="log.id" class="border-t border-outline-variant hover:bg-surface-container-high transition-colors">
                      <td class="px-5 py-4 text-on-surface-variant font-mono text-xs">[[ log.id ]]</td>
                      <td class="px-5 py-4 font-medium text-primary-fixed-dim">[[ log.username ]]</td>
                      <td class="px-5 py-4">
                        <div class="text-on-surface mb-1 font-medium max-w-xl truncate" :title="log.message">Q: [[ log.message ]]</div>
                        <div class="text-on-surface-variant text-xs max-w-xl truncate" :title="log.response">A: [[ log.response ]]</div>
                      </td>
                      <td class="px-5 py-4 text-on-surface-variant text-xs">[[ formatDate(log.timestamp) ]]</td>
                    </tr>
                    <tr v-if="filteredLogs.length===0"><td colspan="4" class="px-5 py-8 text-center text-on-surface-variant">No logs found.</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- ── USERS TAB ── -->
          <div v-if="activeTab==='users'" class="fade-up flex flex-col gap-4">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-2xl font-light text-on-surface">User Access Management</h2>
                <p class="text-sm text-on-surface-variant mt-1">Manage system roles and permissions</p>
              </div>
            </div>
            
            <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="bg-surface-container-highest text-on-surface-variant text-xs uppercase tracking-widest">
                    <tr>
                      <th class="px-5 py-3 text-left">ID</th>
                      <th class="px-5 py-3 text-left">Username</th>
                      <th class="px-5 py-3 text-left">Role</th>
                      <th class="px-5 py-3 text-left">Queries</th>
                      <th class="px-5 py-3 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="u in usersList" :key="u.id" class="border-t border-outline-variant hover:bg-surface-container-high transition-colors">
                      <td class="px-5 py-4 text-on-surface-variant font-mono text-xs">[[ u.id ]]</td>
                      <td class="px-5 py-4 font-medium text-on-surface">[[ u.username ]]</td>
                      <td class="px-5 py-4">
                        <span v-if="u.is_admin" class="px-2 py-1 bg-primary-fixed-dim/20 text-primary-fixed-dim text-xs rounded border border-primary-fixed-dim/30">Admin</span>
                        <span v-else class="px-2 py-1 bg-surface-container-highest text-on-surface-variant text-xs rounded border border-outline-variant">User</span>
                      </td>
                      <td class="px-5 py-4 text-on-surface-variant">[[ u.message_count ]]</td>
                      <td class="px-5 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                          <button @click="toggleAdmin(u.id)" :disabled="u.username === username" class="p-1.5 rounded bg-surface-container-highest hover:bg-primary-fixed-dim/20 hover:text-primary-fixed-dim text-on-surface-variant transition-colors disabled:opacity-50" title="Toggle Admin">
                            <span class="material-symbols-outlined text-sm">shield</span>
                          </button>
                          <button @click="deleteUser(u.id)" :disabled="u.username === username" class="p-1.5 rounded bg-surface-container-highest hover:bg-error/20 hover:text-error text-on-surface-variant transition-colors disabled:opacity-50" title="Delete User">
                            <span class="material-symbols-outlined text-sm">delete</span>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- ── DOCUMENTS TAB ── -->
          <div v-if="activeTab==='docs'" class="fade-up flex flex-col gap-6">
            <div>
              <h2 class="text-2xl font-light text-on-surface">Knowledge Base Engine</h2>
              <p class="text-sm text-on-surface-variant mt-1">Manage documents used for answers and retrieval</p>
            </div>

            <!-- Upload Zone -->
            <div class="bg-surface-container border border-outline-variant rounded-xl p-6">
              <div class="drop-zone rounded-xl p-8 flex flex-col items-center gap-3 cursor-pointer text-center mb-4"
                :class="isDragging ? 'drag-over' : ''" @click="$refs.fileInput.click()" @dragover.prevent="isDragging=true" @dragleave="isDragging=false" @drop.prevent="onDrop">
                <span class="material-symbols-outlined text-4xl text-primary-fixed-dim/60">cloud_upload</span>
                <div class="text-on-surface font-medium">Drag & drop files or <span class="text-primary-fixed-dim">browse</span></div>
                <div class="text-xs text-on-surface-variant">Supports PDF and TXT</div>
                <input type="file" ref="fileInput" class="hidden" multiple accept=".pdf,.txt" @change="onFileSelect"/>
              </div>

              <div v-if="selectedFiles.length > 0" class="flex flex-col gap-2 mb-4">
                <div v-for="(f, i) in selectedFiles" :key="i" class="flex items-center gap-3 px-3 py-2 bg-surface-container-low rounded-lg border border-outline-variant">
                  <span class="material-symbols-outlined text-primary-fixed-dim text-lg">description</span>
                  <span class="flex-1 text-sm text-on-surface truncate">[[ f.name ]]</span>
                  <span class="text-xs text-on-surface-variant">[[ (f.size/1024).toFixed(1) ]] KB</span>
                  <button @click="removeFile(i)" class="text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">close</span></button>
                </div>
              </div>

              <button v-if="selectedFiles.length > 0" @click="uploadFiles" :disabled="uploadLoading"
                class="w-full py-2.5 bg-primary-fixed-dim text-on-primary-fixed font-semibold rounded-lg hover:bg-primary-fixed transition-all disabled:opacity-50 text-sm">
                <span v-if="uploadLoading" class="flex items-center justify-center gap-2"><span class="material-symbols-outlined animate-spin">sync</span> Processing & Embedding...</span>
                <span v-else>Upload & Process [[ selectedFiles.length ]] File(s)</span>
              </button>

              <div v-if="uploadMsg" class="mt-4 px-4 py-3 rounded-lg text-sm font-medium text-center border" :class="uploadOk ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-error/10 border-error/30 text-error'">
                [[ uploadMsg ]]
              </div>
            </div>

            <!-- Documents List -->
            <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-surface-container-highest text-on-surface-variant text-xs uppercase tracking-widest">
                  <tr>
                    <th class="px-5 py-3 text-left">Document Name</th>
                    <th class="px-5 py-3 text-left">Size</th>
                    <th class="px-5 py-3 text-left">Chunks Embedded</th>
                    <th class="px-5 py-3 text-left">Uploaded By</th>
                    <th class="px-5 py-3 text-left">Date</th>
                    <th class="px-5 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="d in docsList" :key="d.id" class="border-t border-outline-variant hover:bg-surface-container-high transition-colors">
                    <td class="px-5 py-4 font-medium text-on-surface flex items-center gap-2">
                      <span class="material-symbols-outlined text-on-surface-variant text-sm">description</span>
                      [[ d.filename ]]
                    </td>
                    <td class="px-5 py-4 text-on-surface-variant">[[ (d.file_size/1024).toFixed(1) ]] KB</td>
                    <td class="px-5 py-4">
                      <span class="px-2 py-1 bg-surface-container-highest text-primary-fixed-dim text-xs rounded border border-outline-variant font-mono">[[ d.chunks_added ]]</span>
                    </td>
                    <td class="px-5 py-4 text-on-surface-variant">[[ d.uploaded_by ]]</td>
                    <td class="px-5 py-4 text-on-surface-variant text-xs">[[ formatDate(d.uploaded_at) ]]</td>
                    <td class="px-5 py-4 text-right">
                      <button @click="deleteDoc(d.id)" class="p-1.5 rounded bg-surface-container-highest hover:bg-error/20 hover:text-error text-on-surface-variant transition-colors" title="Delete Document">
                        <span class="material-symbols-outlined text-sm">delete</span>
                      </button>
                    </td>
                  </tr>
                  <tr v-if="docsList.length===0"><td colspan="6" class="px-5 py-8 text-center text-on-surface-variant">No documents in knowledge base.</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- ── SETTINGS TAB ── -->
          <div v-if="activeTab==='settings'" class="fade-up flex flex-col gap-6">
            <div>
              <h2 class="text-2xl font-light text-on-surface">System Settings</h2>
              <p class="text-sm text-on-surface-variant mt-1">Configure integrations and runtime behavior</p>
            </div>

            <div class="bg-surface-container border border-outline-variant rounded-xl p-6">
              <h3 class="text-sm font-semibold text-on-surface mb-4">LLM Gateway</h3>

              <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                  <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Base URL</label>
                  <input v-model="settings.llm_base_url" type="text" placeholder="https://…"
                    class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder-on-surface-variant/40 text-sm focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-all" />
                  <p class="mt-2 text-xs text-on-surface-variant">Used to call `/chat/completions`. Leave empty for default.</p>
                </div>

                <div class="col-span-2">
                  <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Model</label>
                  <input v-model="settings.llm_model" type="text" placeholder="provider/model-name"
                    class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder-on-surface-variant/40 text-sm focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-all" />
                </div>

                <div class="col-span-2">
                  <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">API Key</label>
                  <input v-model="settings.llm_api_key" type="password"
                    :placeholder="settings.has_llm_api_key ? 'Configured (enter a new key to rotate)' : 'Enter API key'"
                    class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder-on-surface-variant/40 text-sm focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-all" />
                  <p class="mt-2 text-xs text-on-surface-variant">The key is stored server-side. It is never shown in full.</p>
                </div>
              </div>

              <div class="mt-5 flex items-center justify-end gap-3">
                <button @click="saveSettings" :disabled="settingsLoading"
                  class="px-5 py-2.5 bg-primary-fixed-dim text-on-primary-fixed font-semibold rounded-lg hover:bg-primary-fixed transition-all disabled:opacity-50 text-sm">
                  <span v-if="settingsLoading" class="inline-flex items-center gap-2"><span class="material-symbols-outlined animate-spin text-base">sync</span> Saving…</span>
                  <span v-else>Save Settings</span>
                </button>
              </div>

              <div v-if="settingsMsg" class="mt-4 px-4 py-3 rounded-lg text-sm font-medium text-center border"
                :class="settingsOk ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-error/10 border-error/30 text-error'">
                [[ settingsMsg ]]
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </template>
</div>

<script>
const { createApp, ref, computed, onMounted, nextTick } = Vue;
const API_URL = (() => {
  const meta = document.querySelector('meta[name="api-base-url"]');
  const fromServer = meta?.getAttribute('content')?.trim();
  if (fromServer) return fromServer;
  const { protocol, hostname } = window.location;
  return `${protocol}//${hostname}:8000`;
})();

// Dark theme defaults for Chart.js
Chart.defaults.color = '#b9cacb';
Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';
Chart.defaults.font.family = 'Inter';

createApp({
  delimiters: ['[[',']]'],
  setup() {
    const isAdmin = ref(false);
    const loadingAuth = ref(true);
    const username = ref('');
    const activeTab = ref('dashboard');

    const stats = ref({ total_logs: 0, today_logs: 0, total_users: 0, total_docs: 0, daily_activity: [], top_users: [] });
    const logsList = ref([]);
    const usersList = ref([]);
    const docsList = ref([]);
    const searchLogs = ref('');

    const selectedFiles = ref([]);
    const fileInput = ref(null);
    const isDragging = ref(false);
    const uploadLoading = ref(false);
    const uploadMsg = ref('');
    const uploadOk = ref(false);

    const settings = ref({ llm_base_url: '', llm_model: '', llm_api_key: '', has_llm_api_key: false });
    const settingsLoading = ref(false);
    const settingsMsg = ref('');
    const settingsOk = ref(false);

    let activityChartInstance = null;

    const token = () => localStorage.getItem('eniso_token');

    onMounted(async () => {
      try {
        const res = await fetch(`${API_URL}/api/auth/me`, { headers:{ Authorization:`Bearer ${token()}` }});
        if (res.ok) {
          const d = await res.json();
          if (d.is_admin) { 
            isAdmin.value = true; 
            username.value = d.username; 
            await loadData();
          }
        }
      } catch {}
      finally { loadingAuth.value = false; }
    });

    const loadData = async () => {
      if(!isAdmin.value) return;
      try {
        const [stRes, lgRes, usRes, dcRes, seRes] = await Promise.all([
          fetch(`${API_URL}/api/admin/stats`, { headers:{ Authorization:`Bearer ${token()}` }}),
          fetch(`${API_URL}/api/logs`, { headers:{ Authorization:`Bearer ${token()}` }}),
          fetch(`${API_URL}/api/admin/users`, { headers:{ Authorization:`Bearer ${token()}` }}),
          fetch(`${API_URL}/api/admin/documents`, { headers:{ Authorization:`Bearer ${token()}` }}),
          fetch(`${API_URL}/api/admin/settings`, { headers:{ Authorization:`Bearer ${token()}` }})
        ]);
        if(stRes.ok) stats.value = await stRes.json();
        if(lgRes.ok) logsList.value = await lgRes.json();
        if(usRes.ok) usersList.value = await usRes.json();
        if(dcRes.ok) docsList.value = await dcRes.json();
        if(seRes.ok) settings.value = await seRes.json();
        
        if (activeTab.value === 'dashboard') {
          nextTick(renderChart);
        }
      } catch (e) { console.error('Data load error', e); }
    };

    const renderChart = () => {
      const ctx = document.getElementById('activityChart');
      if (!ctx || !stats.value.daily_activity) return;
      
      if (activityChartInstance) activityChartInstance.destroy();
      
      const labels = stats.value.daily_activity.map(d => d.date);
      const data = stats.value.daily_activity.map(d => d.count);

      activityChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Queries',
            data: data,
            borderColor: '#00dbe9',
            backgroundColor: 'rgba(0, 219, 233, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#00dbe9',
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
            x: { grid: { display: false } }
          }
        }
      });
    };

    const formatDate = (ts) => {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    };

    const filteredLogs = computed(() => {
      if (!searchLogs.value) return logsList.value;
      const q = searchLogs.value.toLowerCase();
      return logsList.value.filter(l => 
        (l.message||'').toLowerCase().includes(q) || 
        (l.response||'').toLowerCase().includes(q) || 
        (l.username||'').toLowerCase().includes(q)
      );
    });

    const exportCSV = (data, filename) => {
      if(!data.length) return;
      const keys = Object.keys(data[0]);
      const csv = [
        keys.join(','),
        ...data.map(row => keys.map(k => `"${String(row[k]).replace(/"/g, '""')}"`).join(','))
      ].join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    };

    // User Actions
    const toggleAdmin = async (id) => {
      try {
        await fetch(`${API_URL}/api/admin/users/${id}/toggle-admin`, { method:'PATCH', headers:{ Authorization:`Bearer ${token()}` }});
        loadData();
      } catch {}
    };
    const deleteUser = async (id) => {
      if(!confirm('Are you sure you want to delete this user?')) return;
      try {
        await fetch(`${API_URL}/api/admin/users/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token()}` }});
        loadData();
      } catch {}
    };

    // Doc Actions
    const deleteDoc = async (id) => {
      if(!confirm('Delete this document? (Note: Context removal may require vector DB rebuild)')) return;
      try {
        await fetch(`${API_URL}/api/admin/documents/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token()}` }});
        loadData();
      } catch {}
    };

    // Upload
    const onFileSelect = (e) => { selectedFiles.value = Array.from(e.target.files); uploadMsg.value=''; };
    const onDrop = (e) => { isDragging.value=false; selectedFiles.value=Array.from(e.dataTransfer.files).filter(f=>f.name.match(/\.(pdf|txt)$/i)); uploadMsg.value=''; };
    const removeFile = (i) => { selectedFiles.value = selectedFiles.value.filter((_,idx)=>idx!==i); };

    const uploadFiles = async () => {
      if (!selectedFiles.value.length) return;
      uploadLoading.value = true; uploadMsg.value='';
      const fd = new FormData();
      selectedFiles.value.forEach(f => fd.append('files', f));
      try {
        const res = await fetch(`${API_URL}/api/upload`, { method:'POST', headers:{ Authorization:`Bearer ${token()}` }, body:fd });
        const d = await res.json();
        if (res.ok) { 
          uploadOk.value=true; 
          uploadMsg.value=`✓ Successfully embedded ${d.chunks_added} chunks.`; 
          selectedFiles.value=[]; 
          if(fileInput.value) fileInput.value.value=''; 
          loadData();
        } else { uploadOk.value=false; uploadMsg.value=`Error: ${d.detail||'Upload failed'}`; }
      } catch { uploadOk.value=false; uploadMsg.value='Cannot connect to server.'; }
      finally { uploadLoading.value=false; }
    };

    const logout = () => { localStorage.removeItem('eniso_token'); window.location.href='/'; };

    const saveSettings = async () => {
      settingsLoading.value = true;
      settingsMsg.value = '';
      try {
        const payload = {
          llm_base_url: settings.value.llm_base_url || '',
          llm_model: settings.value.llm_model || '',
          llm_api_key: (settings.value.llm_api_key || '').includes('************') ? undefined : settings.value.llm_api_key
        };
        // Remove undefined so backend doesn't treat it as explicit update
        Object.keys(payload).forEach(k => payload[k] === undefined && delete payload[k]);
        const res = await fetch(`${API_URL}/api/admin/settings`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization:`Bearer ${token()}` },
          body: JSON.stringify(payload),
        });
        if (res.ok) {
          settingsOk.value = true;
          settingsMsg.value = 'Settings saved.';
          await loadData();
        } else {
          const d = await res.json().catch(() => ({}));
          settingsOk.value = false;
          settingsMsg.value = d.detail || 'Failed to save settings.';
        }
      } catch {
        settingsOk.value = false;
        settingsMsg.value = 'Cannot connect to server.';
      } finally {
        settingsLoading.value = false;
      }
    };

    return {
      isAdmin, loadingAuth, username, activeTab,
      stats, logsList, usersList, docsList, searchLogs, filteredLogs,
      formatDate, exportCSV, toggleAdmin, deleteUser, deleteDoc,
      selectedFiles, fileInput, isDragging, onFileSelect, onDrop, removeFile,
      uploadLoading, uploadMsg, uploadOk, uploadFiles, logout, loadData,
      settings, settingsLoading, settingsMsg, settingsOk, saveSettings
    };
  }
}).mount('#app');
</script>
</body>
</html>
